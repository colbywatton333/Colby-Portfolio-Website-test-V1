document.getElementById('btnDelete').addEventListener('click', deleteSelected);

function deleteSelected() {
  if (state.selectedIds.size === 0) return;
  state.elements = state.elements.filter(e => !state.selectedIds.has(e.id));
  state.selectedIds.clear();
  pushHistory();
  render();
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'Escape' && state.cropMode) {
    state.cropMode = false; pushHistory(); render(); e.preventDefault(); return;
  }
  if (e.key === 'c' && !e.ctrlKey && !e.metaKey && state.selectedId) {
    const sel = state.elements.find(el => el.id === state.selectedId);
    if (sel && sel.type === 'image') {
      state.cropMode = !state.cropMode;
      if (state.cropMode && !sel.crop) sel.crop = { top: 0, right: 0, bottom: 0, left: 0 };
      render(); e.preventDefault(); return;
    }
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedIds.size > 0) { deleteSelected(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { undo(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'z' && e.shiftKey) { redo(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'y') { redo(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 's') { saveLayout(); e.preventDefault(); }
});

// ─── GRID SNAP ────────────────────────────────────────────────────────────────
document.getElementById('gridToggle').addEventListener('change', (e) => {
  state.gridSnap = e.target.checked;
});

// ─── UNDO / REDO ──────────────────────────────────────────────────────────────
function pushHistory() {
  const snapshot = { pages: JSON.parse(JSON.stringify(state.pages)), currentPage: state.currentPage };
  state.history = state.history.slice(0, state.historyIndex + 1);
  state.history.push(snapshot);
  if (state.history.length > 50) state.history.shift();
  state.historyIndex = state.history.length - 1;
}

function undo() {
  if (state.historyIndex <= 0) return;
  state.historyIndex--;
  const snap = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
  state.pages = snap.pages;
  state.currentPage = Math.min(snap.currentPage, state.pages.length - 1);
  state.selectedId = null;
  renderPageBar();
  render();
}

function redo() {
  if (state.historyIndex >= state.history.length - 1) return;
  state.historyIndex++;
  const snap = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
  state.pages = snap.pages;
  state.currentPage = Math.min(snap.currentPage, state.pages.length - 1);
  state.selectedId = null;
  renderPageBar();
  render();
}

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);

// ─── ALIGNMENT ────────────────────────────────────────────────────────────────
function updateAlignVisibility() {
  document.getElementById('alignGroup').style.display = state.selectedIds.size > 0 ? '' : 'none';
}

document.querySelectorAll('.align-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const ids = [...state.selectedIds];
    const els = ids.map(id => state.elements.find(e => e.id === id)).filter(Boolean);
    if (els.length === 0) return;

    const action = btn.dataset.align;
    const canvas = document.getElementById('canvas');
    const cvW = canvas ? canvas.offsetWidth : state.canvasWidth;

    function getH(el) { return el.height === 'auto' ? 60 : el.height; }

    if (els.length === 1) {
      // Align relative to canvas
      const el = els[0];
      if (action === 'left') el.x = 0;
      else if (action === 'centerH') el.x = (100 - el.width) / 2;
      else if (action === 'right') el.x = 100 - el.width;
      else if (action === 'top') el.y = 0;
      else if (action === 'centerV') { /* needs canvas height — skip for single */ }
      else if (action === 'bottom') { /* skip */ }
    } else {
      // Align relative to group bounds
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      els.forEach(el => {
        minX = Math.min(minX, el.x);
        maxX = Math.max(maxX, el.x + el.width);
        minY = Math.min(minY, el.y);
        maxY = Math.max(maxY, el.y + getH(el));
      });

      if (action === 'left') els.forEach(el => { el.x = minX; });
      else if (action === 'centerH') {
        const cx = (minX + maxX) / 2;
        els.forEach(el => { el.x = cx - el.width / 2; });
      }
      else if (action === 'right') els.forEach(el => { el.x = maxX - el.width; });
      else if (action === 'top') els.forEach(el => { el.y = minY; });
      else if (action === 'centerV') {
        const cy = (minY + maxY) / 2;
        els.forEach(el => { el.y = cy - getH(el) / 2; });
      }
      else if (action === 'bottom') els.forEach(el => { el.y = maxY - getH(el); });
      else if (action === 'distH') {
        if (els.length < 3) return;
        const sorted = [...els].sort((a, b) => a.x - b.x);
        const totalWidth = sorted.reduce((s, el) => s + el.width, 0);
        const gap = (maxX - minX - totalWidth) / (sorted.length - 1);
        let cx = minX;
        sorted.forEach(el => { el.x = cx; cx += el.width + gap; });
      }
      else if (action === 'distV') {
        if (els.length < 3) return;
        const sorted = [...els].sort((a, b) => a.y - b.y);
        const totalH = sorted.reduce((s, el) => s + getH(el), 0);
        const gap = (maxY - minY - totalH) / (sorted.length - 1);
        let cy = minY;
        sorted.forEach(el => { el.y = cy; cy += getH(el) + gap; });
      }
    }

    pushHistory();
    render();
  });
});

// Hook align visibility into render
const _origRender = render;
// We call updateAlignVisibility after each render via a MutationObserver-free approach:
// Patch renderProperties to also update alignment visibility.
const _origRenderProps = renderProperties;
renderProperties = function() {
  _origRenderProps();
  updateAlignVisibility();
};

// ─── SAVE ─────────────────────────────────────────────────────────────────────
document.getElementById('btnSave').addEventListener('click', saveLayout);

async function saveLayout() {
  if (!state.projectId) { toast('No project selected', 'error'); return; }

  // About mode — save layout + about data
  if (state.projectId === '__about__') {
    try {
      const layout = { canvasWidth: state.canvasWidth, pageHeight: state.pageHeight, pages: state.pages };
      const res = await fetch('/api/layouts', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId: '__about__', layout })
      });
      if (!res.ok) { toast('Save failed: HTTP ' + res.status, 'error'); return; }
      const data = await res.json();
      if (data.ok) {
        ALL_LAYOUTS['__about__'] = layout;
        // Also save ABOUT_DATA text content
        await fetch('/api/about', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(ABOUT_DATA || { sections: [] })
        });
        toast('About layout saved', 'success');
      } else {
        toast('Save failed: ' + (data.error || 'unknown'), 'error');
      }
    } catch (e) { toast('Save failed: ' + e.message, 'error'); }
    return;
  }

  // Archive mode — save archive data
  if (state.projectId === '__archive__') {
    try {
      const res = await fetch('/api/archive', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ARCHIVE_DATA || { images: [] })
      });
      const data = await res.json();
      if (data.ok) { toast('Archive saved', 'success'); }
      else { toast('Save failed: ' + (data.error || 'unknown'), 'error'); }
    } catch (e) { toast('Save failed: ' + e.message, 'error'); }
    return;
  }

  const layout = {
    canvasWidth: state.canvasWidth,
    pageHeight: state.pageHeight,
    pages: state.pages
  };
  try {
    const res = await fetch('/api/layouts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId: state.projectId, layout })
    });
    if (!res.ok) {
      toast('Save failed: HTTP ' + res.status + (res.status === 405 ? ' — run "node serve.mjs" on port 3000' : ''), 'error');
      return;
    }
    const data = await res.json();
    if (data.ok) {
      ALL_LAYOUTS[state.projectId] = layout;
      // Also save project metadata to projects.json
      if (state.project) {
        try {
          await fetch('/api/projects/' + encodeURIComponent(state.projectId), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: state.project.title,
              year: state.project.year,
              categories: state.project.categories,
              description: state.project.description,
              materials: state.project.materials,
              process: state.project.process
            })
          });
        } catch (e) { /* metadata save is secondary */ }
      }
      toast('Layout saved', 'success');
    } else {
      toast('Save failed: ' + (data.error || 'unknown'), 'error');
    }
  } catch (e) {
    toast('Save failed: ' + e.message, 'error');
  }
}

function renderAboutWYSIWYG(container) {
  container.innerHTML = '';
  const data = ABOUT_DATA || { sections: [] };

  data.sections.forEach((section, si) => {
    const item = document.createElement('div');
    item.className = 'aw-item';
    item.dataset.si = si;

    // Row — matching live site .about-row styling
    const row = document.createElement('div');
    row.className = 'aw-row';

    const title = document.createElement('span');
    title.className = 'aw-title';
    title.textContent = section.title;
    row.appendChild(title);

    // Double-click title to edit inline
    title.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'aw-title-input';
      input.value = section.title;
      title.replaceWith(input);
      input.focus();
      input.select();
      function commit() {
        section.title = input.value;
        renderAboutWYSIWYG(container);
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') input.blur(); });
    });

    // Toggle open/close on row click
    row.addEventListener('click', () => {
      const isOpen = item.classList.contains('aw-open');
      // Close all others
      container.querySelectorAll('.aw-item.aw-open').forEach(other => {
        if (other !== item) other.classList.remove('aw-open');
      });
      item.classList.toggle('aw-open', !isOpen);
    });

    item.appendChild(row);

    // Content area (matches project accordion open style)
    const content = document.createElement('div');
    content.className = 'aw-content';

    if (section.type === 'bio') {
      renderBioWYSIWYG(content, section, si, container);
    } else {
      renderContactWYSIWYG(content, section, si, container);
    }

    item.appendChild(content);

    // Start first section open by default
    if (si === 0) item.classList.add('aw-open');

    container.appendChild(item);
  });

  // Add section button
  const addBtn = document.createElement('button');
  addBtn.className = 'aw-add-btn';
  addBtn.textContent = '+ Add Section';
  addBtn.addEventListener('click', () => {
    if (!ABOUT_DATA) ABOUT_DATA = { sections: [] };
    ABOUT_DATA.sections.push({ id: 'section-' + Date.now(), title: 'New Section', type: 'contact', lines: [''] });
    renderAboutWYSIWYG(container);
  });
  container.appendChild(addBtn);
}

function renderBioWYSIWYG(content, section, si, root) {
  const inner = document.createElement('div');
  inner.className = 'aw-bio-inner';

  // Text column
  const textCol = document.createElement('div');
  textCol.className = 'aw-bio-text';

  (section.text || []).forEach((para, pi) => {
    const row = document.createElement('div');
    row.className = 'aw-para-row';
    const p = document.createElement('div');
    p.className = 'aw-para';
    p.contentEditable = 'true';
    p.textContent = para;
    p.dataset.si = si;
    p.dataset.pi = pi;
    p.addEventListener('input', () => {
      ABOUT_DATA.sections[si].text[pi] = p.textContent;
    });
    p.addEventListener('blur', () => {
      ABOUT_DATA.sections[si].text[pi] = p.textContent;
    });
    p.addEventListener('click', (e) => e.stopPropagation());
    row.appendChild(p);
    // Delete paragraph button
    const rmBtn = document.createElement('button');
    rmBtn.className = 'aw-remove-para';
    rmBtn.textContent = '\u2715';
    rmBtn.title = 'Remove paragraph';
    rmBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      ABOUT_DATA.sections[si].text.splice(pi, 1);
      renderAboutWYSIWYG(root);
    });
    row.appendChild(rmBtn);
    textCol.appendChild(row);
  });

  // Add paragraph button
  const addPara = document.createElement('button');
  addPara.className = 'aw-inline-btn';
  addPara.textContent = '+ Add Paragraph';
  addPara.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!ABOUT_DATA.sections[si].text) ABOUT_DATA.sections[si].text = [];
    ABOUT_DATA.sections[si].text.push('');
    renderAboutWYSIWYG(root);
  });
  textCol.appendChild(addPara);

  inner.appendChild(textCol);

  // Images column (2x2 grid)
  const imgCol = document.createElement('div');
  imgCol.className = 'aw-bio-images';

  const images = section.images || [null, null, null, null];
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'about-img-slot';
    slot.dataset.si = si;
    slot.dataset.ii = i;

    if (images[i]) {
      const img = document.createElement('img');
      img.src = images[i];
      slot.appendChild(img);
      const rmBtn = document.createElement('button');
      rmBtn.className = 'remove-img';
      rmBtn.textContent = '\u2715';
      rmBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        ABOUT_DATA.sections[si].images[i] = null;
        renderAboutWYSIWYG(root);
      });
      slot.appendChild(rmBtn);
    } else {
      slot.innerHTML = '<span class="slot-label">Click to add</span>';
    }

    slot.addEventListener('click', (e) => {
      if (e.target.classList.contains('remove-img')) return;
      e.stopPropagation();
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*,.svg,.svgz';
      fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        const b64 = await new Promise(resolve => {
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(file);
        });
        try {
          const res = await fetch('/api/about/upload', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, data: b64 })
          });
          const result = await res.json();
          if (result.ok) {
            if (!ABOUT_DATA.sections[si].images) ABOUT_DATA.sections[si].images = [null, null, null, null];
            ABOUT_DATA.sections[si].images[i] = result.path;
            renderAboutWYSIWYG(root);
            toast('Image uploaded', 'success');
          }
        } catch (err) {
          toast('Upload failed: ' + err.message, 'error');
        }
      });
      fileInput.click();
    });

    imgCol.appendChild(slot);
  }

  inner.appendChild(imgCol);
  content.appendChild(inner);
}

// ─── DRAG: move anchored text with parent image ───────────────────────────────
// Override startDrag to also move anchored children
const _origStartDrag = startDrag;
function startDrag(id, e) {
  const el = state.elements.find(x => x.id === id);
  if (!el) return;

  const canvas = document.getElementById('canvas');
  const canvasRect = canvas.getBoundingClientRect();
  const cvW = canvasRect.width;
  const startX = e.clientX;
  const startY = e.clientY;
  const origX = el.x;
  const origY = el.y;

  // Snapshot anchored children positions
  const children = state.elements.filter(x => x.parentImageId === id);
  const childOrigins = children.map(c => ({ id: c.id, x: c.x, y: c.y }));

  function onMove(ev) {
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    let newX = origX + (dx / cvW) * 100;
    let newY = origY + dy;
    if (state.gridSnap) {
      const pxX = (newX / 100) * cvW;
      newX = (Math.round(pxX / state.gridSize) * state.gridSize / cvW) * 100;
      newY = Math.round(newY / state.gridSize) * state.gridSize;
    }
    const clampedX = Math.max(0, Math.min(100 - el.width, newX));
    const clampedY = Math.max(0, newY);
    const deltaX = clampedX - origX;
    const deltaY = clampedY - origY;
    el.x = clampedX;
    el.y = clampedY;
    // Move anchored children together
    childOrigins.forEach(co => {
      const child = state.elements.find(x => x.id === co.id);
      if (child) { child.x = co.x + deltaX; child.y = co.y + deltaY; }
    });
    render();
  }

  function onUp() {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    pushHistory();
  }

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

  const frame = document.createElement('div');
  frame.id = 'previewDeviceFrame';

  const scale = deviceWidth < 1440 ? Math.min(1, (window.innerWidth * 0.85) / deviceWidth) : 1;
  frame.style.cssText = `
    width: ${deviceWidth}px;
    transform: scale(${scale});
    transform-origin: top center;
    margin: 0 auto;
    position: relative;
    background: var(--bg);
    padding: 32px ${SITE_PAD};
    box-sizing: border-box;
    border-left: 1px solid #1f1f1f;
    border-right: 1px solid #1f1f1f;
  `;

  // Freeform content wrapper
  const wrapper = document.createElement('div');
  wrapper.style.position = 'relative';
  wrapper.style.width = '100%';

  let maxBottom = 0;
  state.elements.forEach(elData => {
    const el = document.createElement('div');
    el.style.position = 'absolute';
    el.style.left = elData.x + '%';
    el.style.top = elData.y + 'px';
    el.style.width = elData.width + '%';
    if (elData.height !== 'auto') el.style.height = elData.height + 'px';
    el.style.zIndex = elData.zIndex || 0;

    if (elData.type === 'text') {
      el.style.whiteSpace = 'pre-wrap';
      el.style.wordBreak = 'break-word';
      el.textContent = elData.content;
      if (elData.style) Object.keys(elData.style).forEach(k => { el.style[k] = elData.style[k]; });
    } else if (elData.type === 'image') {
      const img = document.createElement('img');
      img.src = elData.src;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = elData.objectFit || 'cover';
      img.style.display = 'block';
      el.appendChild(img);
      if (elData.crop) {
        const c = elData.crop;
        if (c.top || c.right || c.bottom || c.left) {
          el.style.clipPath = `inset(${c.top}% ${c.right}% ${c.bottom}% ${c.left}%)`;
        }
      }
    }

    const bottom = elData.y + (elData.height === 'auto' ? 200 : elData.height);
    if (bottom > maxBottom) maxBottom = bottom;
    wrapper.appendChild(el);
  });

  wrapper.style.minHeight = maxBottom + 60 + 'px';
  frame.appendChild(wrapper);
  content.appendChild(frame);

  // Spacer so scaled frame doesn't overlap rows below
  const spacer = document.createElement('div');
  spacer.style.height = (maxBottom + 100) * scale + 'px';
  content.appendChild(spacer);

  // Mock rows below (2 faded rows)
  [3, 4].forEach(i => {
    const row = document.createElement('div');
    row.className = 'mock-row';
    row.innerHTML = `<span class="mock-row-title">${mockTitles[i % mockTitles.length]}</span>
      <span class="mock-row-cat">Design</span>
      <span class="mock-row-year">202${3 - i % 3}</span>`;
    content.appendChild(row);
  });
}

// ─── PREVIEW BUTTON ───────────────────────────────────────────────────────────
document.getElementById('btnPreview').addEventListener('click', () => {
  if (!state.projectId) return;
  const overlay = document.getElementById('previewOverlay');
  buildPreviewContent(state.previewDevice);
  overlay.classList.add('active');
});

document.getElementById('previewClose').addEventListener('click', () => {
  document.getElementById('previewOverlay').classList.remove('active');
});

// Preview device switcher
document.querySelectorAll('.pdev-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pdev-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.previewDevice = parseInt(btn.dataset.pdev);
    buildPreviewContent(state.previewDevice);
  });
});

// ─── PROJECT MODAL (New / Edit) ───────────────────────────────────────────────
function showProjectModal(project) {
  const isEdit = !!project;
  const modal = document.getElementById('projectModal');
  const title = document.getElementById('modalTitle');
  title.textContent = isEdit ? 'Edit Project Info' : 'New Project';

  document.getElementById('modalProjTitle').value = isEdit ? project.title : '';
  document.getElementById('modalProjYear').value = isEdit ? project.year : new Date().getFullYear();
  document.getElementById('modalProjCats').value = isEdit ? (project.categories || []).join(', ') : '';
  document.getElementById('modalProjDesc').value = isEdit ? project.description : '';
  document.getElementById('modalProjMats').value = isEdit ? project.materials : '';
  document.getElementById('modalProjProc').value = isEdit ? project.process : '';

  modal.classList.remove('hidden');
  modal.dataset.mode = isEdit ? 'edit' : 'new';
}

document.getElementById('btnNewProject').addEventListener('click', () => showProjectModal(null));
document.getElementById('btnEditProject').addEventListener('click', () => {
  if (state.project) showProjectModal(state.project);
});
document.getElementById('modalCancel').addEventListener('click', () => {
  document.getElementById('projectModal').classList.add('hidden');
});

document.getElementById('modalSave').addEventListener('click', async () => {
  const modal = document.getElementById('projectModal');
  const isEdit = modal.dataset.mode === 'edit';
  const data = {
    title: document.getElementById('modalProjTitle').value.trim(),
    year: parseInt(document.getElementById('modalProjYear').value) || new Date().getFullYear(),
    categories: document.getElementById('modalProjCats').value.split(',').map(s => s.trim()).filter(Boolean),
    description: document.getElementById('modalProjDesc').value.trim(),
    materials: document.getElementById('modalProjMats').value.trim(),
    process: document.getElementById('modalProjProc').value.trim()
  };

  if (!data.title) { toast('Title is required', 'error'); return; }

  try {
    if (isEdit) {
      const res = await fetch('/api/projects/' + encodeURIComponent(state.projectId), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (!result.ok) throw new Error(result.error);
      // Update local data
      Object.assign(state.project, data);
      const idx = ALL_PROJECTS.findIndex(p => p.id === state.projectId);
      if (idx >= 0) Object.assign(ALL_PROJECTS[idx], data);
      // Update selector text
      const opt = document.querySelector('#projectSelector option[value="' + state.projectId + '"]');
      if (opt) opt.textContent = data.title + ' (' + data.year + ')';
      updateSiteContext(state.project);
      toast('Project updated', 'success');
    } else {
      const res = await fetch('/api/projects', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (!result.ok) throw new Error(result.error);
      // Add to local data
      ALL_PROJECTS.push(result.project);
      const sel = document.getElementById('projectSelector');
      const opt = document.createElement('option');
      opt.value = result.project.id;
      opt.textContent = result.project.title + ' (' + result.project.year + ')';
      sel.appendChild(opt);
      sel.value = result.project.id;
      loadProject(result.project.id);
      toast('Project created', 'success');
    }
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }

  modal.classList.add('hidden');
});

// ─── IMAGE UPLOAD ─────────────────────────────────────────────────────────────
document.getElementById('btnUploadImage').addEventListener('click', () => {
  document.getElementById('imageFileInput').click();
});

document.getElementById('imageFileInput').addEventListener('change', async (e) => {
  if (!state.projectId) return;
  const files = e.target.files;
  if (!files.length) return;

  for (const file of files) {
    const reader = new FileReader();
    const b64 = await new Promise(resolve => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    try {
      // Use different upload endpoint for about mode
      const isAbout = state.projectId === '__about__';
      const url = isAbout
        ? '/api/about/upload'
        : '/api/projects/' + encodeURIComponent(state.projectId) + '/images';
      const res = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: file.name, data: b64 })
      });
      const result = await res.json();
      if (!result.ok) throw new Error(result.error);

      if (isAbout) {
        await addImageElement(result.path, 10, 50, 30);
      } else {
        if (!state.project.images) state.project.images = [];
        state.project.images.push([result.path]);
      }
      toast('Uploaded: ' + file.name, 'success');
    } catch (err) {
      toast('Upload failed: ' + err.message, 'error');
    }
  }

  // Refresh image library for project mode
  if (state.project) populateImageLibrary(state.project);
  e.target.value = '';
});

// Show/hide edit button and upload button when project changes
const origLoadProject = loadProject;
// (handled inline — btnEditProject visibility set in loadProject wrapper below)
</script>
